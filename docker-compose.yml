services:
  app:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    image: streamlit:latest
    ports: 
      - "8501:8501"
    volumes:
      - ./streamlit:/app
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]